ecosystem {
  no_update_news = true
}

general {
  border_size = 1
  col.active_border = rgb(bd93f9)
  col.inactive_border = rgba(44475aaa)
  col.nogroup_border = rgba(282a36dd)
  col.nogroup_border_active = rgb(bd93f9)
  gaps_in = 2
  gaps_out = 4
  layout = master
}

master {
  mfact = 0.8
  new_status = master
  new_on_top = true
  drop_at_cursor = false
}

decoration {
  dim_inactive = true
  dim_around = 0.6
  rounding = 5
  rounding_power = 4
  blur {
    enabled = true
    size = 5
    passes = 1
  }
  shadow {
    color = rgba(1E202966)
    range = 10
    render_power = 3
    scale = 0.97
  }
}

input {
  kb_layout = us
  kb_options = rupeesign:4
  kb_variant = altgr-intl
}

misc {
  disable_hyprland_logo = true
  disable_splash_rendering = true
  vfr = true
}

animations {
  enabled = true
  animation = windows,    1, 2, linear,  slide
  animation = layers,     1, 1, default, slide
  animation = fade,       1, 5, default
  animation = border,     1, 5, default
  animation = workspaces, 1, 2, linear, slide
}

workspace = w[tv1], gapsout:0, gapsin:0
workspace = f[1],   gapsout:0, gapsin:0

windowrule = match:float 1, border_size 0
windowrule = match:float 0, match:workspace w[tv1],            border_size 0, rounding 0
windowrule = match:float 0, match:workspace f[1],              border_size 0, rounding 0

windowrule = match:class firefox, match:title Mozilla Firefox,                       workspace 2
windowrule = match:class firefox, match:title Library,                                             float 1, size (monitor_w*0.5) (monitor_h*0.5)
windowrule = match:class .blueman-manager-wrapped,                                                 float 1, size (monitor_w*0.5) (monitor_h*0.5),  center 1
windowrule = match:class com.saivert.pwvucontrol,                                                  float 1, size (monitor_w*0.5) (monitor_h*0.5),  center 1
windowrule = match:class mpv,                                                                      float 1, size (monitor_w*0.9) (monitor_h*0.9),  center 1, dim_around 1, no_vrr on
windowrule = match:class imv,                                                                      float 1, size (monitor_w*0.9) (monitor_h*0.9),  center 1, dim_around 1
windowrule = match:class org.gnome.Evince,                                                         float 1, size (monitor_w*0.9) (monitor_h*0.9),  center 1
windowrule = match:class com.system76.CosmicFiles,                                                 float 1, size (monitor_w*0.6) (monitor_h*0.6),  center 1
windowrule = match:class io.elementary.desktop.agent-polkit,                                                                                                 dim_around 1, pin 1
windowrule = match:class .virt-manager-wrapped,                                                    float 1
windowrule = match:class .virt-manager-wrapped, match:title Virtual Machine Manager,                        move (monitor_w*0.05) (monitor_h*0.1), size (monitor_w*0.25) (monitor_h*0.5)
windowrule = match:class .piper-wrapped,                                                           float 1, center 1,                              size (monitor_w*0.5) (monitor_h*0.5)
windowrule = match:class steam,                                                      workspace 9
windowrule = match:class net.lutris.Lutris,                                          workspace 8,  float 1, center 1,                              size (monitor_w*0.6) (monitor_h*0.6)
windowrule = match:class discord,                                                    workspace 10, float 1, center 1,                              size (monitor_w*0.6) (monitor_h*0.6)

layerrule = match:namespace waybar, blur on
layerrule = match:namespace waybar, ignore_alpha 0

bindm = SUPER,mouse:272,           movewindow
bindm = SUPER_SHIFT,mouse:272,     resizewindow

bind = SUPER_SHIFT,Q,       killactive,
bind = SUPER_SHIFT,space,   togglefloating,active
bind = SUPER_SHIFT,space,   centerwindow
bind = SUPER_SHIFT,F,       fullscreen,0

bind = SUPER_SHIFT,C,       exec, @hyprctl@ reload

bind = SUPER,Return,        exec, @runapp@ @ghostty@
bind = SUPER,d,             exec, @rofi@ -show drun -run-command "@runapp@ {cmd}"
bind = SUPER,e,             exec, @runapp@ @ghostty@ --class=yazi -e @yazi@
bind = SUPER,i,             exec, @runapp@ @firefox@
bind = SUPER_SHIFT,i,       exec, @runapp@ @firefox@ -P "private" -profile "$(mktemp -d)" -no-remote

bind = SUPER_SHIFT,escape,  exec, @power-menu@
bind = SUPER_SHIFT,b,       exec, @blueman@

bind = SUPER,escape,        exec, @loginctl@ lock-session
bind = SUPER_SHIFT,W,       exec, @systemctl@ --user start update-wallpaper.service
bind = SUPER_ALT, W,        exec, @pkill@ -SIGUSR1 waybar

bind = SUPER,1,             workspace, 1
bind = SUPER,2,             workspace, 2
bind = SUPER,3,             workspace, 3
bind = SUPER,4,             workspace, 4
bind = SUPER,5,             workspace, 5
bind = SUPER,6,             workspace, 6
bind = SUPER,7,             workspace, 7
bind = SUPER,8,             workspace, 8
bind = SUPER,9,             workspace, 9
bind = SUPER,0,             workspace, 10

bind = SUPER_SHIFT,1,       movetoworkspace, 1
bind = SUPER_SHIFT,2,       movetoworkspace, 2
bind = SUPER_SHIFT,3,       movetoworkspace, 3
bind = SUPER_SHIFT,4,       movetoworkspace, 4
bind = SUPER_SHIFT,5,       movetoworkspace, 5
bind = SUPER_SHIFT,6,       movetoworkspace, 6
bind = SUPER_SHIFT,7,       movetoworkspace, 7
bind = SUPER_SHIFT,8,       movetoworkspace, 8
bind = SUPER_SHIFT,9,       movetoworkspace, 9
bind = SUPER_SHIFT,0,       movetoworkspace, 10

bind = SUPER,l,             layoutmsg,rollnext
bind = SUPER,l,             layoutmsg,focusmaster
bind = SUPER,h,             layoutmsg,rollprev
bind = SUPER,h,             layoutmsg,focusmaster
bind = SUPER_SHIFT,z,       layoutmsg,orientationcycle left right
bind = SUPER,m,             layoutmsg,focusmaster
bind = SUPER_SHIFT,m,       layoutmsg,swapwithmaster

bind = ,XF86AudioMute,      exec, @wpctl@ set-mute @DEFAULT_AUDIO_SINK@ toggle
bind = ,XF86AudioPlay,      exec, @playerctl@ play-pause
bind = ,XF86AudioNext,      exec, @playerctl@ next
bind = ,XF86AudioPrev,      exec, @playerctl@ previous

bindr = ,print,             exec, @grimblast@ --notify save screen
bindr = SHIFT,print,        exec, @grimblast@ --notify --freeze save area

binde = ,XF86AudioRaiseVolume,  exec, @wpctl@ set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
binde = ,XF86AudioLowerVolume,  exec, @wpctl@ set-volume @DEFAULT_AUDIO_SINK@ 5%-

env = XCURSOR_THEME, Bibata-Modern-Amber
env = XCURSOR_SIZE,  24
exec-once = @hyprctl@ setcursor "Bibata-Modern-Amber" 24

@extra-config@

